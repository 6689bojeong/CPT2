<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>충피티 광고 신청</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --wine: #8B1A2B; --wine-light: #A8324A; --wine-dark: #620E1C;
      --wine-pale: #F9EEF0; --bg: #fdf6f7; --border: #ead8db;
      --text: #1a0a0d; --text-sub: #6b7280;
    }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 40px 16px; }
    .container { max-width: 640px; margin: 0 auto; }
    .header { text-align: center; margin-bottom: 32px; }
    .header a { display: inline-flex; align-items: center; gap: 6px; text-decoration: none; color: var(--text-sub); font-size: 13px; margin-bottom: 24px; transition: color 0.15s; }
    .header a:hover { color: var(--wine); }
    .logo { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; }
    .logo img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
    .logo-text { font-size: 22px; font-weight: 700; color: var(--wine); }
    .header h1 { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
    .header p { font-size: 13px; color: var(--text-sub); line-height: 1.6; }
    .card { background: white; border-radius: 16px; border: 1px solid var(--border); padding: 28px; box-shadow: 0 2px 12px rgba(139,26,43,0.06); }
    .info-box { background: var(--wine-pale); border-left: 3px solid var(--wine); border-radius: 8px; padding: 12px 14px; margin-bottom: 24px; font-size: 13px; color: var(--wine-dark); line-height: 1.7; }
    .section-title { font-size: 14px; font-weight: 600; color: var(--wine); margin-bottom: 14px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 5px; }
    label .required { color: var(--wine); margin-left: 2px; }
    label .hint { font-weight: 400; color: var(--text-sub); font-size: 12px; margin-left: 4px; }
    input[type="text"], input[type="tel"], input[type="email"], select, textarea {
      width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 9px;
      font-family: 'Noto Sans KR', sans-serif; font-size: 13px; color: var(--text);
      background: white; transition: border-color 0.2s; outline: none;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--wine); box-shadow: 0 0 0 3px rgba(139,26,43,0.08); }
    textarea { resize: vertical; min-height: 90px; line-height: 1.6; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 22px 0; }
    .submit-btn { width: 100%; padding: 13px; background: var(--wine); color: white; border: none; border-radius: 10px; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 6px; }
    .submit-btn:hover { background: var(--wine-light); }
    .notice { text-align: center; font-size: 12px; color: var(--text-sub); margin-top: 10px; line-height: 1.6; }
    @media (max-width: 480px) { .card { padding: 18px; } body { padding: 20px 12px; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <a href="/">← 충피티로 돌아가기</a>
      <div class="logo">
        <img src="우왕이.png" alt="충피티">
        <span class="logo-text">충피티</span>
      </div>
      <h1>광고 신청하기 📢</h1>
      <p>충북대학교 학생들에게 우리 가게를 알려보세요!<br>신청 내용 확인 후 이메일로 연락드립니다.</p>
    </div>
    <div class="card">
      <div class="info-box">
        📌 <strong>광고 안내</strong><br>
        충피티 광고는 메인 화면에 노출됩니다.<br>
        충북대학교 주변 업체 대상으로 운영되며, 신청 후 검토를 거쳐 게재됩니다.
      </div>
      <form id="adForm">
        <p class="section-title">광고주 정보</p>
        <div class="form-group">
          <label>가게(업체)명 <span class="required">*</span></label>
          <input type="text" id="bizName" placeholder="예: 충북대 돈까스 사창점" required />
        </div>
        <div class="form-group">
          <label>담당자 이름 <span class="required">*</span></label>
          <input type="text" id="name" placeholder="예: 홍길동" required />
        </div>
        <div class="form-group">
          <label>연락처 <span class="required">*</span><span class="hint">(전화 또는 카카오)</span></label>
          <input type="tel" id="contact" placeholder="예: 010-1234-5678" required />
        </div>
        <div class="form-group">
          <label>이메일 <span class="hint">(선택)</span></label>
          <input type="email" id="email" placeholder="예: example@email.com" />
        </div>
        <hr class="divider">
        <p class="section-title">광고 내용</p>
        <div class="form-group">
          <label>광고 문구 <span class="required">*</span><span class="hint">(50자 이내)</span></label>
          <input type="text" id="adText" placeholder='예: "충피티" 인증 시 음료수 공짜! 🥤' maxlength="50" required />
        </div>
        <div class="form-group">
          <label>업체 위치</label>
          <input type="text" id="location" placeholder="예: 충북대학교 중문 앞" />
        </div>
        <div class="form-group">
          <label>희망 광고 기간</label>
          <select id="period">
            <option value="">선택해주세요</option>
            <option value="1개월">1개월</option>
            <option value="3개월">3개월</option>
            <option value="6개월">6개월</option>
            <option value="협의">기간 협의</option>
          </select>
        </div>
        <div class="form-group">
          <label>추가 요청사항 <span class="hint">(선택)</span></label>
          <textarea id="extra" placeholder="광고 관련 추가 요청사항이나 문의사항을 자유롭게 작성해주세요."></textarea>
        </div>
        <button type="submit" class="submit-btn">신청서 제출하기</button>
        <p class="notice">신청 내용 검토 후 입력하신 연락처로 연락드립니다.<br>문의: essencezy.bongtwo@gmail.com</p>
      </form>
    </div>
  </div>
  <script>
    document.getElementById('adForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.querySelector('.submit-btn');
      const bizName  = document.getElementById('bizName').value.trim();
      const name     = document.getElementById('name').value.trim();
      const contact  = document.getElementById('contact').value.trim();
      const email    = document.getElementById('email').value.trim();
      const adText   = document.getElementById('adText').value.trim();
      const location = document.getElementById('location').value.trim();
      const period   = document.getElementById('period').value;
      const extra    = document.getElementById('extra').value.trim();
      if (!bizName || !name || !contact || !adText) {
        alert('필수 항목(*)을 모두 입력해주세요.');
        return;
      }
      btn.disabled = true;
      btn.textContent = '제출 중...';
      try {
        const res = await fetch('/api/ad-apply', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ bizName, name, contact, email, adText, location, period, extra }),
        });
        if (!res.ok) throw new Error('서버 오류');
        btn.textContent = '신청 완료! ✓';
        btn.style.background = '#2d7a4f';
        document.getElementById('adForm').querySelectorAll('input, select, textarea').forEach(el => el.disabled = true);
        document.querySelector('.notice').textContent = '신청이 접수되었습니다. 검토 후 연락드릴게요 😊';
      } catch {
        alert('제출에 실패했습니다. 잠시 후 다시 시도해주세요.');
        btn.disabled = false;
        btn.textContent = '신청서 제출하기';
      }
    });
  </script>
</body>
</html>
